name: Flutter CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable Git LFS (for large assets)
        run: |
          git lfs install --local || true
          git lfs pull || true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Set Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Android App Bundle (release)
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-android-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Ensure debug keystore
        run: |
          mkdir -p $HOME/.android
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkey -v \
              -keystore $HOME/.android/debug.keystore \
              -storepass android -keypass android \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Download bundletool
        run: |
          curl -L -o bundletool.jar https://github.com/google/bundletool/releases/download/1.16.0/bundletool-all-1.16.0.jar

      - name: Build universal APK from AAB
        run: |
          java -jar bundletool.jar build-apks \
            --bundle build/app/outputs/bundle/release/app-release.aab \
            --output app-universal.apks \
            --mode=universal \
            --ks $HOME/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android

      - name: Extract universal APK
        run: |
          unzip -o app-universal.apks -d apks_out
          mv apks_out/universal.apk app-universal.apk

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: app-android-universal-apk
          path: app-universal.apk

      # Linux build disabled per requirements
